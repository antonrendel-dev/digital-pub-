name: Retag existing posts (one-time)

on:
  workflow_dispatch:

jobs:
  retag:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Run retag on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'bash -s' << 'ENDSSH'
          export PATH=$HOME/.nvm/versions/node/v22.12.0/bin:$PATH
          cd ~/d-pub.ru/app
          node << 'ENDNODE'
          require('dotenv').config();
          const { Pool } = require('pg');
          const pool = new Pool({ connectionString: process.env.DATABASE_URL });

          const TAG_KEYWORDS = {
            smm: ['smm','смм','соцсети','social media','инстаграм','instagram','контент-менеджер','smm менеджер','смм менеджер','сммщик','риллс','риллсмейкер','рилсмейкер','рилсы','вконтакте','вк','vkontakte','телеграм'],
            seo: ['seo','поисковая оптимизация','продвижение сайт','ключевые слова','wordstat','вордстат'],
            dizajn: ['дизайн','дизайнер','designer','figma','фигма','ui/ux','ui ux','тильда','tilda'],
            marketing: ['маркетинг','маркетолог','performance','контент-маркетинг'],
            menedzher: ['менеджер','проджект','prodject','продакт','project manager','product manager','аккаунт','тим лид','team lead','crm','amocrm','amo','амо'],
            target: ['таргет','таргетолог','директолог','директ','контекстная реклама','яндекс директ','yandex direct'],
            razrabotka: ['разработчик','программист','прогер','developer','frontend','backend','фулстек','react','python','javascript','битрикс','битрикс24','wordpress','вордпресс','верстальщик','верстка','opencart','open cart','joomla'],
            analitika: ['аналитик','аналитика','analytics','data analyst','bi'],
            finansy: ['финанс','бухгалтер','экономист'],
            kreativ: ['креатив','креативщик'],
            copywriting: ['копирайтер','копирайтинг','copywriter','copywriting','автор текстов','рерайтер','рерайтинг','редактор','статьи','копир'],
            content: ['контент','content','контент-мейкер','контент мейкер','контентмейкер','contentmaker','content maker','контент-стратег','контент стратег','посты'],
            udalyonka: ['удалённо','удаленно','удалёнка','удаленка','remote','дистанционно'],
            ofis: ['офис','office','в офисе'],
            gibrid: ['гибрид','гибридный','hybrid'],
            junior: ['junior','джуниор','стажёр','стажер','начинающий'],
            middle: ['middle','мидл'],
            senior: ['senior','сеньор','ведущий','lead'],
          };

          const TARGET_SLUGS = ['copywriting', 'content', 'kreativ'];

          function isBoundary(ch) {
            return /[\s\.,;:!?\-—–()\/\[\]{}«»"'#@\n\r]/.test(ch);
          }

          function matchTags(text) {
            const lower = text.toLowerCase();
            const matched = [];
            for (const [slug, keywords] of Object.entries(TAG_KEYWORDS)) {
              for (const kw of keywords) {
                const idx = lower.indexOf(kw.toLowerCase());
                if (idx === -1) continue;
                const before = idx > 0 ? lower[idx - 1] : ' ';
                const after = idx + kw.length < lower.length ? lower[idx + kw.length] : ' ';
                if ((idx === 0 || isBoundary(before)) && (idx + kw.length >= lower.length || isBoundary(after))) {
                  matched.push(slug);
                  break;
                }
              }
            }
            return matched;
          }

          async function run() {
            // Get target tag IDs
            const tagsRes = await pool.query(
              'SELECT id, slug FROM "Tag" WHERE slug = ANY($1)',
              [TARGET_SLUGS]
            );
            if (tagsRes.rows.length === 0) {
              console.error('Target tags not found in DB. Run insert-tags first.');
              process.exit(1);
            }
            const tagIdBySlug = {};
            for (const row of tagsRes.rows) tagIdBySlug[row.slug] = row.id;
            console.log('Target tags:', tagsRes.rows.map(r => `${r.slug}(${r.id})`).join(', '));

            // Get all published posts
            const postsRes = await pool.query(
              'SELECT id, title, description FROM "Post" WHERE status = $1',
              ['published']
            );
            console.log(`Scanning ${postsRes.rows.length} posts...`);

            let added = 0;
            for (const post of postsRes.rows) {
              const text = [post.title, post.description].filter(Boolean).join(' ');
              const matched = matchTags(text);

              // Get existing tags for this post
              const existing = await pool.query(
                'SELECT "tagId" FROM "PostTag" WHERE "postId" = $1',
                [post.id]
              );
              const existingIds = new Set(existing.rows.map(r => r.tagId));

              for (const slug of TARGET_SLUGS) {
                if (!matched.includes(slug)) continue;
                const tagId = tagIdBySlug[slug];
                if (!tagId || existingIds.has(tagId)) continue;
                await pool.query(
                  'INSERT INTO "PostTag" ("postId", "tagId") VALUES ($1, $2) ON CONFLICT DO NOTHING',
                  [post.id, tagId]
                );
                console.log(`  + post #${post.id} → ${slug}`);
                added++;
              }
            }
            console.log(`\nDone. Added ${added} tag assignments.`);
          }

          run().then(() => pool.end()).catch(e => { console.error(e); pool.end(); process.exit(1); });
          ENDNODE
          ENDSSH
