name: Diagnose production

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Read runit log + env check + bot status
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Last 50 lines of runit log ==='
            tail -50 ~/d-pub.ru/log/node-runlog/current 2>/dev/null || echo 'log not found'
            echo '=== .env keys (no values) ==='
            grep -o '^[A-Z_]*=' ~/d-pub.ru/app/.env 2>/dev/null || echo '.env not found'
            echo '=== etc/environment files ==='
            ls -la ~/d-pub.ru/etc/environment/ 2>/dev/null
            echo '=== DB_CONNECTION_STRING present? ==='
            [ -f ~/d-pub.ru/etc/environment/DB_CONNECTION_STRING ] && echo 'YES (root-owned)' || echo 'NO'
            echo '=== Process env check ==='
            APP_PID=\$(pgrep -f 'node.*server.js' 2>/dev/null | head -1)
            [ -n \"\$APP_PID\" ] && grep -oP 'DB_CONNECTION_STRING=[^\x00]+' /proc/\$APP_PID/environ 2>/dev/null | cut -c1-50 || echo 'process not found or no access'
            echo '=== Telegram bot ==='
            ls -la /opt/bots/telegram-bot-vac/ 2>/dev/null || echo 'bot dir not found at /opt/bots/telegram-bot-vac/'
            echo '=== Bot process? ==='
            pgrep -a -f 'telegram-bot-vac\|bot-vac' 2>/dev/null || echo 'no bot process found'
            echo '=== Bot logs (last 20) ==='
            tail -20 /opt/bots/telegram-bot-vac/logs/*.log 2>/dev/null || \
            tail -20 /opt/bots/telegram-bot-vac/*.log 2>/dev/null || \
            echo 'no logs found'
            echo '=== DB posts count ==='
            cd ~/d-pub.ru/app && \
            export NVM_DIR=\"\$HOME/.nvm\" && \
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\" && \
            node -e \"
              const { Client } = require('pg');
              const c = new Client({ connectionString: process.env.DATABASE_URL || process.env.DB_CONNECTION_STRING });
              c.connect().then(() => c.query('SELECT COUNT(*) FROM posts')).then(r => { console.log('posts count:', r.rows[0].count); c.end(); }).catch(e => console.error('DB error:', e.message));
            \" 2>/dev/null || echo 'pg check failed'
          "
