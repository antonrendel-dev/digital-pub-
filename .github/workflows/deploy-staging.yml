name: Deploy to staging

on:
  push:
    branches: [dev]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.STAGING_DB_CONNECTION_STRING }}
          DB_CONNECTION_STRING: ${{ secrets.STAGING_DB_CONNECTION_STRING }}
          PAYLOAD_SECRET: ${{ secrets.STAGING_PAYLOAD_SECRET }}
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
          NEXT_PUBLIC_SERVER_URL: https://staging.d-pub.ru

      - name: Compile payload config for CLI
        run: |
          npx esbuild payload.config.ts \
            --bundle=true \
            --platform=node \
            --format=esm \
            --external:payload \
            --external:'@payloadcms/*' \
            --external:crypto \
            --external:next \
            --external:'next/*' \
            --outfile=payload.config.compiled.mjs

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy .next/
        run: rsync -avz --delete --exclude='cache/' .next/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/staging/d-pub/.next/

      - name: Deploy lib/
        run: rsync -avz lib/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/staging/d-pub/lib/

      - name: Deploy public/
        run: rsync -avz --exclude=uploads/ public/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/staging/d-pub/public/

      - name: Deploy content/
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "mkdir -p ~/staging/d-pub/content/articles"
          rsync -avz content/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/staging/d-pub/content/

      - name: Deploy payload-migrations/
        run: rsync -avz --ignore-missing-args payload-migrations/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/staging/d-pub/payload-migrations/

      - name: Deploy payload compiled config
        run: rsync -avz payload.config.compiled.mjs ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/staging/d-pub/

      - name: Deploy package files and next.config
        run: rsync -avz package.json package-lock.json next.config.mjs ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/staging/d-pub/

      - name: Install production dependencies
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/staging/d-pub && npm ci --omit=dev --ignore-scripts --legacy-peer-deps
          "

      - name: Run payload migrate
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "
            cd ~/staging/d-pub && [ -f node_modules/.bin/payload ] && \
              PAYLOAD_CONFIG_PATH=./payload.config.compiled.mjs /usr/bin/node node_modules/.bin/payload migrate || \
              echo 'Payload migrate failed or not installed'
          "

      - name: Restart staging app
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            pm2 restart d-pub-staging 2>&1 || sudo pm2 restart d-pub-staging 2>&1
            sleep 20
            echo '=== PM2 status ==='
            pm2 list 2>/dev/null || sudo pm2 list 2>/dev/null
            echo '=== PM2 logs (last 20) ==='
            pm2 logs d-pub-staging --lines 20 --nostream 2>/dev/null || sudo pm2 logs d-pub-staging --lines 20 --nostream 2>/dev/null || true
          "

      - name: Smoke test staging
        run: |
          echo '=== HTTP status ==='
          curl -s --max-time 15 -o /dev/null -w '%{http_code}' https://staging.d-pub.ru/ || true
          echo ''
          echo '=== Static asset check ==='
          BUILD_ID=$(ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "cat ~/staging/d-pub/.next/BUILD_ID 2>/dev/null || echo 'unknown'")
          echo "BUILD_ID: $BUILD_ID"
