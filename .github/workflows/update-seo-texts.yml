name: Update SEO texts in DB (one-time)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Update seoText for tags on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'bash -s' << 'ENDSSH'
          export PATH=$HOME/.nvm/versions/node/v22.12.0/bin:$PATH
          cd ~/d-pub.ru/app
          node << 'ENDNODE'
          require('dotenv').config();
          const { Pool } = require('pg');
          const pool = new Pool({ connectionString: process.env.DATABASE_URL });

          const updates = [
            {
              slug: 'smm',
              seoText: '<h2>Вакансии SMM-специалиста — работа в социальных сетях</h2><p>SMM (Social Media Marketing) — одна из самых востребованных специализаций в digital. SMM-специалисты ведут корпоративные аккаунты, разрабатывают контент-стратегии и продвигают бренды в социальных сетях. На этой странице — вакансии SMM-менеджеров, контент-мейкеров и специалистов по социальным сетям из Telegram-каналов.</p><h2>Направления SMM</h2><ul><li><strong>SMM-менеджер</strong> — ведение аккаунтов бренда, создание контент-плана, работа с аудиторией.</li><li><strong>Контент-менеджер</strong> — производство и публикация контента: тексты, фото, сторис, видео.</li><li><strong>SMM-стратег</strong> — разработка стратегии присутствия бренда в социальных сетях.</li><li><strong>Community Manager</strong> — работа с комьюнити, ответы на комментарии, модерация.</li><li><strong>Таргетолог + SMM</strong> — совмещение ведения аккаунтов с настройкой таргетированной рекламы.</li></ul><h2>Платформы: ВКонтакте, Telegram, Instagram</h2><p>Российский SMM-рынок сосредоточен вокруг ВКонтакте, Telegram-каналов и YouTube. Значительная часть вакансий предполагает <a href="/vacancies/udalyonka">удалённую работу</a>. Смотрите также <a href="/vacancies/content">вакансии контент-мейкеров</a> и <a href="/vacancies/target">таргетологов</a>.</p>'
            },
            {
              slug: 'marketing',
              seoText: '<h2>Вакансии маркетолога — digital и интернет-маркетинг</h2><p>Digital-маркетинг включает десятки направлений: performance, контент, email, CRM, продуктовый маркетинг. Спрос на маркетологов устойчиво растёт — компании активно конкурируют за опытных специалистов. На этой странице — вакансии маркетологов всех специализаций из профильных Telegram-каналов.</p><h2>Специализации в digital-маркетинге</h2><ul><li><strong>Интернет-маркетолог</strong> — комплексное продвижение бизнеса в интернете, управление каналами.</li><li><strong>Performance-маркетолог</strong> — работа с платными каналами, оптимизация CPA и ROAS.</li><li><strong>CRM-маркетолог</strong> — настройка триггерных коммуникаций, email-маркетинг, retention.</li><li><strong>Продуктовый маркетолог</strong> — маркетинг продукта, GTM-стратегии, исследование аудитории.</li><li><strong>Бренд-менеджер</strong> — управление брендом, позиционирование, коммуникационная стратегия.</li><li><strong>Growth-hacker</strong> — эксперименты с каналами роста, A/B-тесты, оптимизация воронки.</li></ul><h2>Уровни и форматы</h2><p>Вакансии маркетолога есть для всех грейдов: <a href="/vacancies/junior">junior-маркетолог</a>, <a href="/vacancies/middle">middle</a> и <a href="/vacancies/senior">руководитель отдела маркетинга</a>. Многие позиции допускают <a href="/vacancies/udalyonka">удалённую работу</a>. Смотрите также <a href="/vacancies/target">вакансии таргетологов</a> и <a href="/vacancies/seo">SEO-специалистов</a>.</p>'
            },
            {
              slug: 'udalyonka',
              seoText: '<h2>Удалённая работа в digital — актуальные вакансии</h2><p>Удалённый формат стал стандартом для большинства digital-профессий. Маркетологи, дизайнеры, SMM-специалисты, разработчики и аналитики всё чаще работают из любой точки мира. На этой странице — вакансии с полностью дистанционным форматом из профильных Telegram-каналов.</p><h2>Какие вакансии бывают удалёнными</h2><ul><li><strong><a href="/vacancies/smm">SMM и контент</a></strong> — ведение соцсетей, создание контента, не привязано к локации.</li><li><strong><a href="/vacancies/copywriting">Копирайтинг</a></strong> — написание текстов, редактура — полностью удалённая специальность.</li><li><strong><a href="/vacancies/razrabotka">Разработка</a></strong> — большинство IT-вакансий допускают работу из дома.</li><li><strong><a href="/vacancies/dizajn">Дизайн</a></strong> — UI/UX и графический дизайн активно уходят в удалёнку.</li><li><strong><a href="/vacancies/analitika">Аналитика</a></strong> — работа с данными и BI не требует присутствия в офисе.</li><li><strong><a href="/vacancies/seo">SEO</a></strong> — продвижение сайтов почти всегда ведётся дистанционно.</li></ul><h2>Удалёнка или гибрид?</h2><p>Если хотите сохранить гибкость, посмотрите также <a href="/vacancies/gibrid">гибридные вакансии</a>. Полная <a href="/vacancies/ofis">офисная занятость</a> сохраняется в агентствах и крупных командах.</p>'
            },
            {
              slug: 'kreativ',
              seoText: '<h2>Вакансии креативных специалистов в digital</h2><p>Креативщики, арт-директора и креаторы разрабатывают концепции, визуальные решения и нестандартные идеи для брендов. На этой странице собраны вакансии для творческих специалистов digital-рынка из профильных Telegram-каналов.</p><h2>Кто такие креативные специалисты</h2><ul><li><strong>Креатор</strong> — генерирует идеи для рекламных кампаний, контента и брендинга.</li><li><strong>Арт-директор</strong> — руководит визуальным стилем проекта, управляет командой дизайнеров.</li><li><strong>Креативный директор</strong> — формирует творческую стратегию бренда или агентства.</li><li><strong>Бренд-менеджер</strong> — развивает идентичность и позиционирование бренда на рынке.</li></ul><h2>Где работают креативщики</h2><p>Большинство вакансий в креативе — это digital-агентства, рекламные холдинги и крупные бренды. Смотрите также смежные направления: <a href="/vacancies/dizajn">дизайн</a> и <a href="/vacancies/smm">SMM</a>.</p>'
            },
            {
              slug: 'copywriting',
              seoText: '<h2>Вакансии копирайтера — удалённая работа и офис</h2><p>Копирайтинг — одна из самых востребованных специализаций в digital. Копирайтеры пишут тексты для сайтов, лендингов, рекламных объявлений, email-рассылок и постов в соцсетях. На этой странице собраны вакансии копирайтеров, редакторов и авторов из профильных Telegram-каналов.</p><h2>Кого ищут работодатели</h2><ul><li><strong>Копирайтер</strong> — создание продающих текстов для сайтов и рекламы, SEO-копирайтинг.</li><li><strong>Редактор</strong> — работа с авторскими материалами, проверка текстов, контент-стратегия.</li><li><strong>Контент-менеджер</strong> — ведение блога, соцсетей, планирование и публикация материалов.</li><li><strong>Технический писатель</strong> — документация, инструкции, описания для IT-продуктов.</li><li><strong>Сценарист</strong> — тексты для видеоконтента, рилсов и YouTube-роликов.</li></ul><h2>Форматы занятости</h2><p>Большинство вакансий копирайтера предполагают <a href="/vacancies/udalyonka">удалённую работу</a>. Среди вакансий есть предложения для <a href="/vacancies/junior">начинающих</a> авторов и опытных редакторов уровня <a href="/vacancies/senior">senior</a>. Изучите также <a href="/resumes/tag/copywriting">резюме копирайтеров</a>.</p>'
            },
            {
              slug: 'content',
              seoText: '<h2>Вакансии контент-мейкеров и создателей контента</h2><p>Контент — основа любой digital-стратегии. Контент-мейкеры, контент-стратеги и специалисты по контенту создают публикации для соцсетей, блогов, YouTube-каналов и мессенджеров. На этой странице — актуальные вакансии из Telegram-каналов.</p><h2>Специализации в контенте</h2><ul><li><strong>Контент-мейкер</strong> — съёмка и монтаж видео, создание фото и Stories для соцсетей.</li><li><strong>Контент-стратег</strong> — разработка контент-планов, редакционная политика, аналитика охватов.</li><li><strong>Контент-менеджер</strong> — публикация и ведение материалов на сайте или в социальных сетях.</li><li><strong>Видеомонтажёр</strong> — монтаж роликов для YouTube, Reels, TikTok и внутренних проектов.</li></ul><h2>Рынок контент-вакансий</h2><p>Спрос на специалистов по контенту растёт: компании развивают YouTube, Telegram и VK. Большинство вакансий предполагают <a href="/vacancies/udalyonka">удалённый формат</a>. Смотрите также <a href="/vacancies/smm">SMM-вакансии</a> и <a href="/vacancies/copywriting">вакансии копирайтеров</a>.</p>'
            },
          ];

          async function run() {
            for (const { slug, seoText } of updates) {
              const r = await pool.query(
                'UPDATE "Tag" SET "seoText" = $1 WHERE slug = $2',
                [seoText, slug]
              );
              console.log(slug + ':', r.rowCount ? 'updated' : 'not found');
            }
            console.log('Done.');
          }

          run().then(() => pool.end()).catch(e => { console.error(e); pool.end(); process.exit(1); });
          ENDNODE
          ENDSSH
