name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_CONNECTION_STRING: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
          NEXT_PUBLIC_SERVER_URL: https://d-pub.ru

      - name: Compile payload config for CLI
        run: |
          npx esbuild payload.config.ts \
            --bundle=true \
            --platform=node \
            --format=esm \
            --external:payload \
            --external:'@payloadcms/*' \
            --external:crypto \
            --external:next \
            --external:'next/*' \
            --outfile=payload.config.compiled.mjs

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'printf "DB_CONNECTION_STRING=%s\nDATABASE_URL=%s\nPAYLOAD_SECRET=%s\nNEXT_PUBLIC_SERVER_URL=https://d-pub.ru\nNEXT_PUBLIC_YANDEX_METRIKA_ID=%s\n" \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.PAYLOAD_SECRET }}" \
            "${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}" \
            > ~/d-pub.ru/.env'

      - name: Deploy .next/
        run: rsync -avz --delete --exclude='cache/' .next/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/.next/

      - name: Deploy lib/
        run: rsync -avz lib/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/lib/

      - name: Deploy public/
        run: rsync -avz --exclude=uploads/ public/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/public/

      - name: Deploy content/
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ~/d-pub.ru/content"
          rsync -avz content/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/content/

      - name: Deploy payload-migrations/
        run: rsync -avz --ignore-missing-args payload-migrations/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/payload-migrations/

      - name: Deploy payload compiled config
        run: rsync -avz payload.config.compiled.mjs ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/

      - name: Deploy package files
        run: rsync -avz package.json package-lock.json ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/

      - name: Install production dependencies
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/d-pub.ru && npm ci --omit=dev --ignore-scripts --legacy-peer-deps
          "

      - name: Run payload migrate
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/d-pub.ru && [ -f node_modules/.bin/payload ] && \
              PAYLOAD_CONFIG_PATH=./payload.config.compiled.mjs node node_modules/.bin/payload migrate || \
              echo 'Payload not installed, skipping migration'
          "

      - name: Verify deploy
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== BUILD_ID deployed ===' && cat ~/d-pub.ru/.next/BUILD_ID 2>/dev/null || echo 'BUILD_ID not found'
          "

      - name: Diagnose platform startup
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== hello.js content ===' && cat ~/d-pub.ru/hello.js 2>/dev/null || echo 'no hello.js'
            echo '=== Procfile ===' && cat ~/d-pub.ru/Procfile 2>/dev/null || echo 'no Procfile'
            echo '=== .node-version ===' && cat ~/d-pub.ru/.node-version 2>/dev/null || echo 'no .node-version'
            echo '=== running node processes ===' && ps aux 2>/dev/null | grep -i node | grep -v grep || echo 'no node processes'
            echo '=== PATH ===' && echo \$PATH
            echo '=== which node ===' && which node 2>/dev/null || echo 'no node in PATH'
            echo '=== env node from nvm ===' && source ~/.nvm/nvm.sh 2>/dev/null && which node && node --version
            echo '=== ls home/bin ===' && ls ~/bin/ 2>/dev/null || echo 'no ~/bin'
            echo '=== app logs last 30 ===' && tail -30 ~/d-pub.ru/app.log 2>/dev/null || tail -30 ~/logs/app.log 2>/dev/null || echo 'no app.log found'
          "

      - name: Restart app
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            touch ~/d-pub.ru/reload
            echo 'reload triggered'
          "
