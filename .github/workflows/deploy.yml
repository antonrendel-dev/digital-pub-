name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_CONNECTION_STRING: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
          NEXT_PUBLIC_SERVER_URL: https://d-pub.ru

      - name: Compile payload config for CLI
        run: |
          npx esbuild payload.config.ts \
            --bundle=true \
            --platform=node \
            --format=esm \
            --external:payload \
            --external:'@payloadcms/*' \
            --external:crypto \
            --external:next \
            --external:'next/*' \
            --outfile=payload.config.compiled.mjs

      - name: Compile payload migrations to CJS
        run: |
          for f in payload-migrations/*.ts; do
            [ -f "$f" ] || continue
            out="${f%.ts}.js"
            npx esbuild "$f" \
              --bundle=false \
              --platform=node \
              --format=cjs \
              --outfile="$out"
          done

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Write env vars (NetAngels etc/environment + .env)
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            mkdir -p ~/d-pub.ru/etc/environment
            printf '%s' '${{ secrets.PAYLOAD_SECRET }}' > ~/d-pub.ru/etc/environment/PAYLOAD_SECRET
            printf '%s' 'https://d-pub.ru' > ~/d-pub.ru/etc/environment/NEXT_PUBLIC_SERVER_URL
            printf '%s' '${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}' > ~/d-pub.ru/etc/environment/NEXT_PUBLIC_YANDEX_METRIKA_ID
            echo '22' > ~/d-pub.ru/.nvmrc
          "
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'printf "DB_CONNECTION_STRING=%s\nDATABASE_URL=%s\nPAYLOAD_SECRET=%s\nNEXT_PUBLIC_SERVER_URL=https://d-pub.ru\nNEXT_PUBLIC_YANDEX_METRIKA_ID=%s\n" \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.PAYLOAD_SECRET }}" \
            "${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}" \
            > ~/d-pub.ru/app/.env'

      - name: Deploy .next/
        run: rsync -avz --delete --exclude='cache/' .next/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/.next/

      - name: Deploy lib/
        run: rsync -avz lib/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/lib/

      - name: Deploy public/
        run: rsync -avz --exclude=uploads/ public/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/public/

      - name: Deploy content/
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ~/d-pub.ru/app/content"
          rsync -avz content/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/content/

      - name: Deploy payload-migrations/
        run: rsync -avz --ignore-missing-args payload-migrations/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/payload-migrations/

      - name: Deploy payload compiled config
        run: rsync -avz payload.config.compiled.mjs ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/

      - name: Deploy package files and next.config
        run: rsync -avz package.json package-lock.json next.config.mjs ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/

      - name: Install production dependencies
        run: |
          LOCK_HASH="${{ hashFiles('package-lock.json') }}"
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            PREV_HASH=\$(cat ~/d-pub.ru/.npm-lock-hash 2>/dev/null || echo '')
            if [ \"\$PREV_HASH\" != \"${LOCK_HASH}\" ]; then
              echo 'package-lock.json changed — running npm ci'
              cd ~/d-pub.ru/app && npm ci --omit=dev --ignore-scripts --legacy-peer-deps
              cd ~/d-pub.ru/app && npm rebuild sharp 2>&1 | tail -3 || true
              printf '%s' \"${LOCK_HASH}\" > ~/d-pub.ru/.npm-lock-hash
            else
              echo 'package-lock.json unchanged — skipping npm ci'
            fi
          "

      - name: Run payload migrate
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/d-pub.ru/app && [ -f node_modules/.bin/payload ] && \
              rm -f payload-migrations/*.ts && \
              PAYLOAD_CONFIG_PATH=./payload.config.compiled.mjs \
              node --experimental-require-module node_modules/.bin/payload migrate || \
              echo 'Payload not installed, skipping migration'
          "

      - name: Verify deploy
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== BUILD_ID deployed ===' && cat ~/d-pub.ru/app/.next/BUILD_ID 2>/dev/null || echo 'BUILD_ID not found'
          "

      - name: Restart app
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            rm -rf ~/d-pub.ru/app/.next/cache/images/ &&
            rm -f ~/d-pub.ru/reload && touch ~/d-pub.ru/reload
          "

      - name: Smoke test (fire-and-forget)
        run: |
          echo "Restart triggered — app initializes in background (Next.js+Payload cold start ~3min)"
          echo "Waiting 20s for quick sanity check..."
          sleep 20
          STATUS=$(curl -s --max-time 10 -o /dev/null -w '%{http_code}' https://d-pub.ru/ 2>/dev/null || echo "000")
          echo "HTTP status after 20s: $STATUS"
          echo "Deploy complete. App will be fully ready within 3 minutes."
