name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_CONNECTION_STRING: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
          NEXT_PUBLIC_SERVER_URL: https://d-pub.ru

      - name: Compile payload config for CLI
        run: |
          npx esbuild payload.config.ts \
            --bundle=true \
            --platform=node \
            --format=esm \
            --external:payload \
            --external:'@payloadcms/*' \
            --external:crypto \
            --external:next \
            --external:'next/*' \
            --outfile=payload.config.compiled.mjs

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy .next/
        run: rsync -avz --delete --exclude='cache/' .next/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/.next/

      - name: Deploy lib/
        run: rsync -avz lib/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/lib/

      - name: Deploy public/
        run: rsync -avz --exclude=uploads/ public/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/public/

      - name: Deploy content/
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ~/d-pub.ru/app/content"
          rsync -avz content/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/content/

      - name: Deploy payload-migrations/
        run: rsync -avz --ignore-missing-args payload-migrations/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/payload-migrations/

      - name: Deploy payload compiled config
        run: rsync -avz payload.config.compiled.mjs ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/

      - name: Deploy package files
        run: rsync -avz package.json package-lock.json ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/

      - name: Install production dependencies
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/d-pub.ru/app && npm ci --omit=dev --ignore-scripts --legacy-peer-deps
          "

      - name: Run payload migrate
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/d-pub.ru/app && [ -f node_modules/.bin/payload ] && \
              PAYLOAD_CONFIG_PATH=./payload.config.compiled.mjs /usr/bin/node node_modules/.bin/payload migrate || \
              echo 'Payload not installed, skipping migration'
          "

      - name: Diagnose production server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            echo '=== node version ===' && node --version 2>&1 || true
            echo '=== npm global list ===' && npm list -g --depth=0 2>&1 | grep -E 'pm2|next' || true
            echo '=== all listening ports ===' && ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || true
            echo '=== all node processes ===' && ps aux | grep -E 'node|next|pm2' | grep -v grep || true
            echo '=== nginx sites ===' && ls /etc/nginx/sites-enabled/ 2>/dev/null || ls /etc/nginx/conf.d/ 2>/dev/null || true
            echo '=== nginx d-pub config ===' && cat /etc/nginx/sites-enabled/*d-pub* 2>/dev/null || cat /etc/nginx/conf.d/*d-pub* 2>/dev/null || true
            echo '=== d-pub.ru app dir ===' && ls ~/d-pub.ru/app/ 2>/dev/null || true
            echo '=== d-pub.ru app BUILD_ID ===' && cat ~/d-pub.ru/app/.next/BUILD_ID 2>/dev/null || true
          "

      - name: Restart app
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            APP_DIR=\"\$HOME/d-pub.ru/app\"
            NODE_BIN=\"\$APP_DIR/node_modules/.bin/next\"
            NEXT_PORT=3001
            echo '=== killing existing next process on port ==='
            fuser -k \${NEXT_PORT}/tcp 2>/dev/null || true
            sleep 1
            echo '=== starting app ==='
            cd \$APP_DIR
            PORT=\$NEXT_PORT nohup node \$NODE_BIN start --port \$NEXT_PORT > /tmp/digital-pub.log 2>&1 &
            echo \$! > /tmp/digital-pub.pid
            sleep 3
            echo '=== checking port ===' && ss -tlnp 2>/dev/null | grep \$NEXT_PORT || true
            echo '=== last log lines ===' && tail -5 /tmp/digital-pub.log 2>/dev/null || true
          "
