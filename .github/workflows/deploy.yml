name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_CONNECTION_STRING: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
          NEXT_PUBLIC_SERVER_URL: https://d-pub.ru

      - name: Compile payload config for CLI
        run: |
          npx esbuild payload.config.ts \
            --bundle=true \
            --platform=node \
            --format=esm \
            --external:payload \
            --external:'@payloadcms/*' \
            --external:crypto \
            --external:next \
            --external:'next/*' \
            --outfile=payload.config.compiled.mjs

      - name: Compile payload migrations to CJS
        run: |
          for f in payload-migrations/*.ts; do
            [ -f "$f" ] || continue
            out="${f%.ts}.js"
            npx esbuild "$f" \
              --bundle=false \
              --platform=node \
              --format=cjs \
              --outfile="$out"
          done

      - name: Compile seed and sync scripts
        run: |
          npx esbuild scripts/seed.ts \
            --bundle=true \
            --platform=node \
            --format=cjs \
            --external:payload \
            --external:'@payloadcms/*' \
            --external:crypto \
            --outfile=scripts/seed.compiled.js
          npx esbuild scripts/sync-telegram.ts \
            --bundle=true \
            --platform=node \
            --format=cjs \
            --outfile=scripts/sync-telegram.compiled.js

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Write env vars (NetAngels etc/environment + .env)
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            mkdir -p ~/d-pub.ru/etc/environment
            printf '%s' '${{ secrets.PAYLOAD_SECRET }}' > ~/d-pub.ru/etc/environment/PAYLOAD_SECRET
            printf '%s' 'https://d-pub.ru' > ~/d-pub.ru/etc/environment/NEXT_PUBLIC_SERVER_URL
            printf '%s' '${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}' > ~/d-pub.ru/etc/environment/NEXT_PUBLIC_YANDEX_METRIKA_ID
            echo '22' > ~/d-pub.ru/.nvmrc
          "
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'printf "DB_CONNECTION_STRING=%s\nDATABASE_URL=%s\nPAYLOAD_SECRET=%s\nNEXT_PUBLIC_SERVER_URL=https://d-pub.ru\nNEXT_PUBLIC_YANDEX_METRIKA_ID=%s\n" \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.PAYLOAD_SECRET }}" \
            "${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}" \
            > ~/d-pub.ru/app/.env'

      - name: Deploy .next/
        run: rsync -avz --delete --exclude='cache/' .next/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/.next/

      - name: Deploy lib/
        run: rsync -avz lib/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/lib/

      - name: Deploy public/
        run: rsync -avz --exclude=uploads/ public/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/public/

      - name: Deploy content/
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ~/d-pub.ru/app/content"
          rsync -avz content/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/content/

      - name: Deploy payload-migrations/
        run: rsync -avz --ignore-missing-args payload-migrations/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/payload-migrations/

      - name: Deploy payload compiled config
        run: rsync -avz payload.config.compiled.mjs ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/

      - name: Deploy scripts/
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ~/d-pub.ru/app/scripts"
          rsync -avz scripts/seed.compiled.js scripts/sync-telegram.compiled.js ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/scripts/

      - name: Deploy package files and next.config
        run: rsync -avz package.json package-lock.json next.config.mjs ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/d-pub.ru/app/

      - name: Install production dependencies
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/d-pub.ru/app && npm ci --omit=dev --ignore-scripts --legacy-peer-deps
          "

      - name: Run payload migrate
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/d-pub.ru/app && [ -f node_modules/.bin/payload ] && \
              rm -f payload-migrations/*.ts && \
              PAYLOAD_CONFIG_PATH=./payload.config.compiled.mjs \
              node --experimental-require-module node_modules/.bin/payload migrate || \
              echo 'Payload not installed, skipping migration'
          "

      - name: Seed users + write PAYLOAD_API_KEY
        run: |
          SEED_OUTPUT=$(ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            export ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}'
            cd ~/d-pub.ru/app && \
            PAYLOAD_CONFIG_PATH=./payload.config.compiled.mjs \
            node --experimental-require-module scripts/seed.compiled.js 2>&1
          " || true)
          echo "$SEED_OUTPUT"
          API_KEY=$(echo "$SEED_OUTPUT" | grep '\[seed\] PAYLOAD_API_KEY=' | head -1 | sed 's/.*PAYLOAD_API_KEY=//')
          if [ -n "$API_KEY" ]; then
            ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "echo 'PAYLOAD_API_KEY=$API_KEY' >> ~/d-pub.ru/app/.env"
            echo "PAYLOAD_API_KEY written to server .env"
          else
            echo "WARNING: could not extract PAYLOAD_API_KEY from seed output"
            echo "Seed output was: $SEED_OUTPUT"
          fi

      - name: Verify deploy
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== BUILD_ID deployed ===' && cat ~/d-pub.ru/app/.next/BUILD_ID 2>/dev/null || echo 'BUILD_ID not found'
          "

      - name: Restart app
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            rm -f ~/d-pub.ru/reload && touch ~/d-pub.ru/reload
            sleep 25
          "

      - name: Run Telegram sync
        run: |
          BOT_TOKEN_VAL='${{ secrets.BOT_TOKEN }}'
          if [ -z "$BOT_TOKEN_VAL" ]; then
            echo "BOT_TOKEN not set in GitHub secrets, skipping sync"
          else
            ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
              export NVM_DIR=\"\$HOME/.nvm\"
              [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
              export BOT_TOKEN='${{ secrets.BOT_TOKEN }}'
              export ADMIN_ID='${{ secrets.ADMIN_ID }}'
              cd ~/d-pub.ru/app && node scripts/sync-telegram.compiled.js 2>&1 | tail -40
            " || echo 'Sync failed or skipped (non-critical)'
          fi

      - name: Smoke test + capture errors
        run: |
          echo '=== HTTP status ==='
          curl -s --max-time 15 -o /dev/null -w '%{http_code}' https://d-pub.ru/ || true
          echo ''
          echo '=== API /api/posts ==='
          curl -s --max-time 15 'https://d-pub.ru/api/posts?limit=1' | head -c 500 || true
          echo ''
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== runit log last 30 ==='
            tail -30 ~/d-pub.ru/log/node-runlog/current 2>/dev/null
          "
