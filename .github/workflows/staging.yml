name: Deploy to staging

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy .next/
        run: rsync -avz --delete .next/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/d-pub.ru/app/.next/

      - name: Deploy Prisma client
        run: rsync -avz generated/prisma/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/d-pub.ru/app/generated/prisma/

      - name: Deploy lib/
        run: rsync -avz lib/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/d-pub.ru/app/lib/

      - name: Deploy public/
        run: rsync -avz public/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:~/d-pub.ru/app/public/

      - name: Restart app
        run: ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "cd ~/d-pub.ru && PORT=3002 touch reload"
