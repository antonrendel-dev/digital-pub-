# Interview Plan for Feature Planning
#
# Tracks progress of adaptive discovery interview for a new feature/bug/refactoring.
# Updated after EACH user response with scoring, values, and remaining gaps.
#
# Scoring: 0-100% (how well we understand this aspect)
# Status: pending → partial → complete
# Required: true = must reach threshold, false = cover if relevant

# ============================================================================
# Interview Metadata (Session Recovery)
# ============================================================================
interview_metadata:
  started: "2026-05-06 09:00:00"
  last_updated: "2026-05-06 09:00:00"
  status: "in_progress"
  can_resume: true
  current_question_num: 0
  feature_size: "L"

# ============================================================================
# Conversation History (for session recovery)
# ============================================================================
# Preserves complete Q&A. Update after EVERY user response.
#
conversation_history:
  - question_num: 1
    timestamp: "2026-05-06 09:05:00"
    topic: "user_problem, target_users, success_criteria, feature_description"
    agent_question: |
      1. Какую конкретную проблему решает? Агрегатор чужих каналов или витрина своих?
      2. Кто ЦА — соискатели или работодатели?
      3. Чем отличается от hh.ru, Habr Career?
      4. Что значит MVP готов?
    user_answer: |
      1. Агрегатор вакансий в нише диджитал фриланса с 10 отобранных каналов. Парсинг через бота @vacancy_bot_ren по ключевым словам. Кросспост в @web_vacancy, @pub_resume, Макс, ВК и на сайт.
      2. ЦА — и соискатели и работодатели. Главная — лента, но сайт многостраничный: разделы Вакансий и Резюме по тегам, статьи по трудоустройству (SEO), форма подачи, рейтинг фрилансеров и работодателей.
      3. Более человечный подход, фокус на надёжных фрилансеров. Позиционирование в процессе.
      4. MVP: сайт запущен, вакансии/резюме из парсинга, фрилансеры откликаются и шлют резюме. Работающие теги-фильтры, поиск, счётчики, отдельные разделы по тегам, SEO статьи.
    summary: "Агрегатор диджитал-фриланса из 10 TG-каналов. ЦА — обе стороны. MVP = чтение + отклик + резюме + теги + SEO статьи."

  - question_num: 2
    timestamp: "2026-05-06 09:15:00"
    topic: "feature_description, constraints, testing_strategy"
    agent_question: |
      1. Отклик — на сайте или ведёт в Telegram?
      2. Рейтинг — в MVP или позже?
      3. Ресурсы, сроки, домен?
      4. Тестирование — автотесты или ручная проверка?
    user_answer: |
      1. MVP — прямой отклик по ссылке на работодателя (Telegram).
      2. Рейтинг — следующая итерация, но зафиксировать в спеке.
      3. Ты + я. Срок MVP — макс 1 месяц. Домен d-pub.ru привяжем когда основной функционал и дизайн готовы.
      4. Автотесты + ручная проверка.
    summary: "Отклик через TG-ссылку. Рейтинг — post-MVP. Срок 1 мес. Автотесты на критический путь."

  - question_num: 3
    timestamp: "2026-05-06 09:25:00"
    topic: "user_problem, success_criteria, target_users"
    agent_question: |
      1. Человечный подход — курированный job board с фокусом на качество?
      2. Критерии успеха MVP — конкретный список.
      3. Специальности — маркетинг или разработка тоже?
    user_answer: |
      1. Да, согласен — курированный job board для digital-фриланса с фокусом на качество.
      2. Согласен, только 10 SEO-статей вместо 3-5.
      3. Вся разработка тоже в скоупе, просто вакансий меньше — но они тоже парсятся и будут.
    summary: "Позиционирование: курированный качественный job board. 10 SEO-статей. Все digital-специальности включая разработку."

  - question_num: 4
    timestamp: "2026-05-06 09:40:00"
    topic: "user_stories, integration_points, ui_ux_requirements"
    agent_question: |
      1. Разделы по тегам — фильтры или отдельные страницы?
      2. Страницы-призраки — убрать лишние из навбара?
      3. Форма подачи резюме — что минимально?
      4. Статьи — кто пишет и как публикует?
    user_answer: |
      1. На главной — фильтры, на боковой панели справа — ведут на отдельные страницы-разделы со своими SEO-тегами и SEO-текстом внизу.
      2. Да, согласен — Главная, Вакансии, Резюме, Статьи для MVP.
      3. Бот @resume_vac_bot уже есть для подачи. Через сайт — аналогичные шаги как в боте (submission_bot в проекте).
      4. Банда агентов (Marketer, SEO, Копирайтер) подбирает семантику, пишет статьи, публикует после утверждения. От меня только ТЗ и апрув.
    summary: "Теги: фильтры на главной + отдельные SEO-страницы. Навбар сокращаем. Подача через бота. Статьи пишут агенты по ТЗ."

  - question_num: 5
    timestamp: "2026-05-06 09:55:00"
    topic: "user_stories, edge_cases, error_scenarios, ui_ux_requirements, integration_points"
    agent_question: |
      1. Работодатель — какой его путь?
      2. Агенты и статьи — где промежуточные этапы ТЗ и апрув?
      3. Edge cases: без зарплаты/описания, пустой тег, парсинг упал.
      4. Мобильная адаптация — responsive или минимум?
    user_answer: |
      1. Работодатель размещает вакансию, потом смотрит резюме.
      2. Агенты — Claude Code. API ок, но где ТЗ и апрув? Непонятен workflow.
      3. Без зарплаты — показываем. Без описания — не показываем. Пустых тегов не должно быть (динамические). Ошибка парсинга — сигнал в боте @web_vacancy_bot.
      4. Полноценный responsive.
    summary: "Работодатель: разместить вакансию → смотреть резюме. Нужен workflow ТЗ→агенты→апрув. Без описания не показываем. Полный responsive."

  - question_num: 6
    timestamp: "2026-05-06 10:10:00"
    topic: "verification_strategy, risks, acceptance_criteria, integration_points"
    agent_question: |
      1. Verification чеклист после деплоя — годится?
      2. Риски — что ещё беспокоит?
      3. Кнопка «Разместить» — через бота или убираем?
    user_answer: |
      1. Годится.
      2. Всё ок, нужно попотеть.
      3. Кнопку оставляем в хэдере и футере, в MVP ведёт на бота. В следующей итерации — форма на сайте. Зафиксировать план по итерациям.
    summary: "Verification ок. Кнопка Разместить → бот в MVP, форма на сайте в след. итерации. Зафиксировать roadmap."

  - question_num: 7
    timestamp: "2026-05-06 10:25:00"
    topic: "acceptance_criteria, roadmap"
    agent_question: |
      Итерации — правильно ли разбивка? MVP, Итерация 2, Итерация 3+.
    user_answer: |
      MVP — ок, но что такое «Динамическая статистика из БД»?
      Итерация 2: админка нужна полноценная, не только модерация. В MVP модерация статей через TG-бота. ≥12 статей ежемесячно.
      Итерация 3+ — ок.
    summary: "MVP согласован. Статистика = счётчики из БД. Админка полноценная в итерации 2. 12 статей/мес."
