      US5 (Работодатель — поиск): Заходит → раздел Резюме → фильтрует → находит фрилансера → связывается через контакт.
      US6 (SEO-статьи): Тони даёт ТЗ → агенты (SEO/Marketer/Writer) подбирают семантику, пишут → Тони апрувит → статья публикуется на /articles/{slug}.
