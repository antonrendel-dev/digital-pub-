# Interview Plan for Feature Planning
#
# Tracks progress of adaptive discovery interview for a new feature/bug/refactoring.
# Updated after EACH user response with scoring, values, and remaining gaps.
#
# Scoring: 0-100% (how well we understand this aspect)
# Status: pending → partial → complete
# Required: true = must reach threshold, false = cover if relevant

# ============================================================================
# Interview Metadata (Session Recovery)
# ============================================================================
interview_metadata:
  started: "2026-05-23 00:00:00"
  last_updated: "2026-05-23 00:00:00"
  status: "completed"
  can_resume: true
  current_question_num: 0
  feature_size: "L"  # New architecture: Payload CMS integrated into Next.js

# ============================================================================
# Conversation History (for session recovery)
# ============================================================================
# Preserves complete Q&A. Update after EVERY user response.
#
conversation_history: []
# Format:
# - question_num: 1
#   timestamp: "2025-11-12 15:20:33"
#   topic: "user_problem"
#   agent_question: |
#     [Full question text]
#   user_answer: |
#     [Full answer text]
#   summary: "Brief summary"

# ============================================================================
# Phase 1: High-Level Feature Understanding
# ============================================================================
# Interview Cycle 1 scope
phase1_feature_overview:

  feature_name:
    score: 90
    status: "complete"
    value: "payload-cms"
    gaps: ""
    required: true

  feature_description:
    score: 92
    status: "complete"
    value: |
      Полноценный CMS на базе Payload v3, встроенный в существующий Next.js 15 проект.
      Управляет: Tags (SEO-поля, H1, seoText rich-text), Posts (вакансии/резюме — редактировать/удалять/создавать),
      Articles (переезжают из MDX в Payload, агенты публикуют через REST API),
      Media (полная медиатека, локальное хранение на NetAngels),
      Globals (Navbar с submenu, Footer, Site Settings, Sidebar).
      Один admin + API-токены для агентов. Мгновенная инвалидация кеша при сохранении.
    gaps: ""
    required: true

  work_type:
    score: 90
    status: "complete"
    value: "feature — новая архитектурная возможность (итерация 2 из project.md)"
    gaps: ""
    required: true

  user_problem:
    score: 70
    status: "partial"
    value: "Любое изменение SEO-текста требует SSH-скрипта или деплоя. H1, seoText, seoDescription тегов правятся только через workflow_dispatch или prisma seed — слишком медленно для контентной работы"
    gaps: "Как часто реально нужно менять контент? Насколько критичен speed-to-edit?"
    required: true

  target_users:
    score: 70
    status: "partial"
    value: "Один администратор (Тони). Multi-admin не нужен в текущей итерации"
    gaps: ""
    required: false

  success_criteria:
    score: 90
    status: "complete"
    value: |
      1. Открыть /admin → видеть разделы: Теги, Вакансии, Резюме, Статьи, Медиа, Globals (navbar, footer, site settings)
      2. В любом разделе — список записей с поиском, нажать → форма с визуальным редактором (Lexical)
      3. Медиатека — загрузить картинку, вставить в любое поле
      4. Сохранить → изменения на сайте мгновенно (revalidatePath)
      5. Агенты публикуют статьи через REST API без UI
      6. CRUD + дублирование для всех существующих типов страниц
      7. Smoke: главная + /vacancies + /vacancies/[category] + /articles + /articles/[slug] + /resumes не сломаны
    gaps: ""
    required: true

  constraints:
    score: 85
    status: "complete"
    value: |
      - Next.js 15 upgrade (с 14.2.x) перед установкой Payload v3
      - NetAngels shared hosting: один Node-процесс, /admin в том же приложении
      - Медиа: локально в public/uploads/ + исключить из rsync в deploy.yml
      - Один admin (Тони) + API-токены для агентов, роли не нужны
      - Instant revalidation через revalidatePath() при сохранении в CMS
    gaps: ""
    required: true

  testing_strategy:
    score: 87
    status: "complete"
    value: |
      - Auth smoke: GET /admin без сессии → redirect to login
      - API smoke: POST /api/articles с токеном → 201, без токена → 401
      - Page smoke: все типы страниц (/, /vacancies, /vacancies/[category], /articles, /articles/[slug], /resumes) возвращают 200
      - Unit: нет (оверкилл для CMS-конфигурации)
      - E2E Playwright: нет (избыточно на старте)
    gaps: ""
    required: true

