# ============================================================================
# Phase 3: Integration & Technical Context
# ============================================================================
# Interview Cycle 2 scope (together with Phase 2)
phase3_integration:

  integration_points:
    score: 90
    status: "complete"
    value: |
      - Payload встраивается в существующий Next.js 15 процесс на /admin
      - Payload REST API на /api/* (рядом с существующим app/)
      - Telegram sync переписывается: Prisma → Payload Local API (POST /api/posts)
      - revalidatePath() вызывается из Payload afterChange hooks
      - Prisma полностью удаляется после миграции
    gaps: ""
    required: true

  dependencies:
    score: 85
    status: "complete"
    value: |
      - Next.js 15 + React 19 (апгрейд с 14/18)
      - @payloadcms/next, @payloadcms/db-postgres, @payloadcms/richtext-lexical
      - Существующий PostgreSQL (та же БД, Payload создаёт свои таблицы рядом с Prisma)
      - Telegram Bot API (sync не меняется концептуально, только слой записи в БД)
    gaps: ""
    required: false

  technical_constraints:
    score: 85
    status: "complete"
    value: |
      - NetAngels shared hosting: один Node-процесс, нет Docker
      - Медиа: локально в public/uploads/ + исключить из rsync
      - CSP headers в next.config.mjs нужно расширить для Payload admin UI
      - PAYLOAD_SECRET обязателен в ENV (random 32+ chars)
      - Payload Jobs (для sync) — пока бета, используем API route (вариант B)
    gaps: ""
    required: false

  data_requirements:
    score: 85
    status: "complete"
    value: |
      - Payload Collections: Posts (vacancies+resumes), Tags, Articles, Media, Users
      - Payload Globals: NavbarSettings, FooterSettings, SiteSettings, SocialChannels
      - Одноразовая миграция: 10 MDX статей → Payload Articles collection
      - Одноразовая миграция: существующие Posts, Tags, PostTag → Payload коллекции
      - DATABASE_URI = тот же PostgreSQL что и сейчас
    gaps: ""
    required: false

  migration_needs:
    score: 85
    status: "complete"
    value: |
      - MDX статьи (10 файлов) → скрипт миграции в Payload Articles
      - Posts + Tags + PostTag: Prisma данные → Payload коллекции (одноразовый скрипт)
      - Prisma schema → Payload schema: параллельно работают до полного переноса
      - После миграции: удалить prisma/, content/articles/, зависимости Prisma из package.json
    gaps: ""
    required: false

# ============================================================================
# Phase 4: Completion
# ============================================================================
phase4_completion:
  userspec_file: ""  # work/{feature}/user-spec.md
  status: "pending"  # pending | created | approved

# ============================================================================
# Decision Rules
# ============================================================================
decision_rules:

  required_threshold: 85
  optional_threshold: 50

  # Stop criteria (BOTH must be true to exit a cycle)
  stop_criteria:
    - "All required items in current cycle scope score >= 85%"
    - "Structural: every required item has non-empty value, no TBD, gaps empty or conscious limitations"

  priority_order:
    - "Required items with score < 85% (lowest score first)"
    - "Optional items mentioned by user in context"
    - "Other optional items if user seems knowledgeable"

  question_strategy:
    - "3-4 questions per batch about different gaps"
    - "Run as many batches as needed — batch size is NOT cycle limit"
    - "Propose solutions based on PK, not just ask questions"
    - "Challenge with substance: counterexamples, code references, unexplored scenarios"
    - "After each response: update scores, values, gaps, conversation_history, save"

# ============================================================================
# Interview Progress
# ============================================================================
progress:
  current_phase: "phase1_feature_overview"
  questions_asked: 0
  last_question: ""
  total_required_score: 0
  total_optional_score: 0
  completion_estimate: "0%"
  user_detail_level: "unknown"  # brief | moderate | detailed

# ============================================================================
# Notes
# ============================================================================
notes: |
  Free-form notes:
  - Important insights
  - Areas of uncertainty
  - Pivot points
  - Scope changes

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
#
# 1. INIT: Created by init-feature-folder.sh at work/{feature}/logs/userspec/interview.yml
#    Set metadata.started, metadata.status: in_progress
#
# 2. INITIAL SCORING: After user's free-form description, score ALL items
#    Detailed 80-95%, brief 50-70%, vague 20-40%, not mentioned 0%
#
# 3. INTERVIEW LOOP (save after EVERY response):
#    a) Find required items with score < 85% in current cycle scope
#    b) Ask 3-4 questions about different gaps
#    c) Propose solutions based on PK
#    d) User answers
#    e) Update: conversation_history, scores, values, gaps, metadata
#    f) Save immediately
#    g) Check stop criteria (score >= 85% AND structural: value filled, no TBD, gaps resolved)
#    h) Not done → repeat. Done → next cycle.
#
# 4. CYCLES:
#    Cycle 1: phase1_feature_overview items
#    Cycle 2: phase2_user_experience + phase3_integration items
#    Cycle 3: ALL items still below threshold (cleanup pass)
#
# 5. RESUME: If metadata.status is "in_progress"
#    Load, show conversation summary, resume from current state
#
# 6. COMPLETION: After user approves user-spec.md
#    Set phase4_completion.status: approved
#    Set metadata.status: completed
